<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONIQ - Música que fica com você</title>
  <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
  <app-header current="home"></app-header>
  
  <main>
    <section class="hero container">
      <div class="hero__text reveal">
        <p class="eyebrow">Edição 07 ● Inverno 2026</p>

        <h1 class="display">
          Som que 
          <div>
            <span class="script">inspira</span>
            <span class="script">emociona</span>
            <span class="script">permanece</span>
            <span class="script">inspira</span>
          </div>
          com <span class="outline">você</span>
        </h1>

        <p class="lede">
          Uma curadoria feita por gente que ouve o silêncio entre as faixas. SONIQ é streaming para colecionadores de atmosfera.
        </p>

        <div class="hero__cta">
          <a href="./pages/playlist.html" class="btn btn__primary">Começar a ouvir</a>
          <a href="./pages/contact.html" class="btn btn__ghost">Saiba mais</a>
        </div>

        <div class="hero__scribble" aria-hidden="true">
          <img src="./assets/icons/arrow.svg">
          <span>Sinta o volume da noite</span>
        </div>
      </div>

      <div class="hero__visual reveal">
        <div class="vinyl__wrapper">
          <div class="vinyl">
            <div class="vinyl__disc"></div>
            <div class="vinyl__label"></div>
          </div>
        </div>
        <div class="floating__wrapper">
          <span class="floating__note note__1">♪</span>
          <span class="floating__note note__2">♬</span>
          <span class="floating__star">✦</span>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./js/components/app-header.js"></script>
</body>
</html>
