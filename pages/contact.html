<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONIQ - Música que fica com você</title>
  <link rel="stylesheet" href="../styles/index.css">
  <link rel="shortcut icon" href="../assets/icons/logo.svg" type="image/x-icon">
</head>

<body>
  <app-header current="contact"></app-header>

  <main class="reveal">
    <section class="page__head container">
      <p class="eyebrow">Alô, alô - testando o microfone</p>
      <h1 class="display">Diga <em>oi</em>, <span class="line__break"><span class="script">mande</span> som.</span></h1>
      <p class="lede">Sugestões, parcerias, pedidos de música. A gente escuta tudo.</p>
    </section>

    <section class="contact container">
      <form id="contact-form" class="form" novalidate>
        <label>
          <span>Nome</span>
          <input type="text" name="name" id="name" required>
          <small class="error" data-for="name"></small>
        </label>

        <label>
          <span>Email</span>
          <input type="email" name="email" id="email" required>
          <small class="error" data-for="email"></small>
        </label>

        <label>
          <span>Mensagem</span>
          <textarea name="message" id="message" rows="6" required></textarea>
          <small class="error" data-for="message"></small>
        </label>

        <button type="submit" class="btn btn__primary btn__lg">Enviar mensagem</button>
      </form>

      <aside class="contact__side">
        <h3>SONIQ MUSICAL</h3>
        <p>Rua da Ondas, 108 <span class="line__break">Sala do Estúdio B</span>Rio de Janeiro - BR</p>
        <p class="tiny">hello@soniq.fm</p>

        <div class="scribble" aria-hidden="true">
          <img src="../assets/icons/logo.svg" alt="">
        </div>
      </aside>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden>
      Mensagem enviada. Obrigado por escutar a gente. 🤘🎶
    </div>
  </main>

  <app-footer></footer>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
